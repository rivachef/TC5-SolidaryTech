---
apiVersion: v1
kind: ConfigMap
metadata:
  name: donation-db-init-sql
  namespace: solidarytech
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS donations (
        id SERIAL PRIMARY KEY,
        ngo_id INT NOT NULL,
        amount NUMERIC(10, 2) NOT NULL,
        donor_name VARCHAR(100) NOT NULL,
        status VARCHAR(20) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

---
apiVersion: batch/v1
kind: Job
metadata:
  name: donation-db-init
  namespace: solidarytech
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          env:
            - name: PGCONNECT_TIMEOUT
              value: "30"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: donation-service-secret
                  key: DATABASE_URL
          command: ["sh", "-ec"]
          args:
            - |
              HOST=$(echo "$DATABASE_URL" | sed -E 's|.*@([^:/]+).*|\1|')
              for i in 1 2 3 4 5 6; do
                if getent hosts "$HOST" >/dev/null 2>&1; then
                  echo "DNS OK ($HOST) na tentativa $i"
                  break
                fi
                echo "Aguardando DNS resolver $HOST (tentativa $i/6)..."
                sleep 5
              done

              echo "Aplicando schema donation_db..."
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/init.sql
              echo "Schema aplicado com sucesso."
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: donation-db-init-sql
