# OpenTelemetry Collector Helm values
# Chart: open-telemetry/opentelemetry-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

service:
  type: ClusterIP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    resource:
      attributes:
        - key: cluster.name
          value: solidarytech-cluster
          action: upsert
        - key: environment
          value: production
          action: upsert

  exporters:
    prometheusremotewrite:
      endpoint: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      resource_to_telemetry_conversion:
        enabled: true

    otlphttp/loki:
      endpoint: "http://loki.monitoring.svc.cluster.local:3100/otlp"

    # New Relic OTLP endpoint (us-east-1 datacenter padrao).
    # license-key vem do secret newrelic-license-key (campo extraEnvs abaixo).
    otlphttp/newrelic:
      endpoint: "https://otlp.nr-data.net"
      headers:
        api-key: "${NEW_RELIC_LICENSE_KEY}"

    debug:
      verbosity: basic

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/newrelic, debug]

      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheusremotewrite, otlphttp/newrelic, debug]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/loki, debug]

    telemetry:
      metrics:
        address: 0.0.0.0:8888

extraEnvs:
  - name: NEW_RELIC_LICENSE_KEY
    valueFrom:
      secretKeyRef:
        name: newrelic-license-key
        key: license-key
        optional: true
