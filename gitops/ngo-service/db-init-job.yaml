---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ngo-db-init-sql
  namespace: solidarytech
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS ngos (
        id SERIAL PRIMARY KEY,
        name VARCHAR(150) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        cause VARCHAR(100) NOT NULL,
        city VARCHAR(100) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO ngos (name, email, cause, city) VALUES
        ('Anjos de Patas', 'contato@anjosdepatas.org', 'Proteção Animal', 'Osasco'),
        ('Educa Mais', 'info@educamais.org', 'Educação', 'São Paulo')
    ON CONFLICT (email) DO NOTHING;

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ngo-db-init
  namespace: solidarytech
  annotations:
    # Roda antes do deployment do ngo-service. Idempotente (CREATE IF NOT EXISTS + ON CONFLICT).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          env:
            - name: PGCONNECT_TIMEOUT
              value: "30"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ngo-service-secret
                  key: DATABASE_URL
          command: ["sh", "-ec"]
          args:
            - |
              # Retry no DNS lookup (CoreDNS pode demorar a ficar pronto)
              HOST=$(echo "$DATABASE_URL" | sed -E 's|.*@([^:/]+).*|\1|')
              for i in 1 2 3 4 5 6; do
                if getent hosts "$HOST" >/dev/null 2>&1; then
                  echo "DNS OK ($HOST) na tentativa $i"
                  break
                fi
                echo "Aguardando DNS resolver $HOST (tentativa $i/6)..."
                sleep 5
              done

              echo "Aplicando schema ngo_db..."
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/init.sql
              echo "Schema aplicado com sucesso."
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: ngo-db-init-sql
