apiVersion: v1
kind: ConfigMap
metadata:
  name: ngo-service-config
  namespace: solidarytech
data:
  PORT: "8081"
  # OpenTelemetry — apontar para o OTel Collector no namespace monitoring
  OTEL_SERVICE_NAME: "ngo-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=solidarytech,deployment.environment=production"
  # Reduz logs verbose do auto-instrumentation
  OTEL_PYTHON_LOG_CORRELATION: "true"
