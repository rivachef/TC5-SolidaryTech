name: CI - volunteer-service

on:
  push:
    branches: [main]
    paths:
      - 'microservices/volunteer-service/**'
      - '.github/workflows/ci-volunteer-service.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'microservices/volunteer-service/**'
      - '.github/workflows/ci-volunteer-service.yaml'

permissions:
  contents: write  # build-push job commita gitops/<svc>/deployment.yaml com nova tag

env:
  SERVICE_NAME: volunteer-service
  WORKING_DIR: microservices/volunteer-service
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
  lint-test:
    name: Lint + Test + SAST + SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit pytest

      - name: Lint (flake8)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flake8 . --count --max-line-length=120 \
            --extend-ignore=E501,W503,E402 \
            --exclude=tests \
            --show-source --statistics

      - name: Unit tests (pytest)
        working-directory: ${{ env.WORKING_DIR }}
        run: pytest -v

      - name: SAST (bandit)
        working-directory: ${{ env.WORKING_DIR }}
        run: bandit -r . -ll -ii --exclude ./tests

      - name: SCA (Trivy filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.WORKING_DIR }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  build-push:
    name: Docker Build + Container Scan + Push ECR
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:latest \
            ${{ env.WORKING_DIR }}

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.tag }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push images to ECR
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:latest
          echo "Pushed ${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.tag }}"

      - name: Update GitOps manifest
        run: |
          MANIFEST="gitops/${{ env.SERVICE_NAME }}/deployment.yaml"
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.SERVICE_NAME }}"
          sed -i.bak -E "s|(image: ${IMAGE}):[^[:space:]]+|\\1:${{ steps.tag.outputs.tag }}|g" "$MANIFEST"
          rm -f "$MANIFEST.bak"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          if git diff --cached --quiet; then
            echo "Sem mudanca no manifest (tag ja era essa)."
          else
            git commit -m "ci(${{ env.SERVICE_NAME }}): bump image to ${{ steps.tag.outputs.tag }}"
            git pull --rebase origin main
            git push origin main
            echo "ArgoCD ira sincronizar em ~1-3 min"
          fi
